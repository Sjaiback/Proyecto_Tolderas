{% extends "base.html" %}

{% block title %}{{ title }} | Tolderas y Carpas el Ruso{% endblock %}

{% block content %}
<section class="section page-offset">
  <div class="section-head reveal">
    <p class="eyebrow">Admin general</p>
    <h1>{{ title }}</h1>
  </div>
  <form class="tracking-box reveal" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Guardar</button>
  </form>
</section>
{% endblock %}
